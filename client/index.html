<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/webp" href="/favicon.webp" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Basic SEO -->
    <title>BoundaryLine | Real-Time Cricket Scoring Platform</title>

    <!-- Description meta tag added -->
    <meta
    name="description"
    content="BoundaryLine is a real-time cricket scoring platform with live commentary, match management, playing XI, squads, scorecards, and Socket.IO powered updates."
    />
    
    <!-- keywords meta tag added for seo -->
    <meta
    name="keywords"
    content="cricket scoring app, cricbuzz clone, live cricket score, cricket management system, socket.io cricket app"
    />
    
    <!-- keywords meta tag added for authors -->
    <meta name="author" content="Avyaan Verma, Om Mhatre, Abhay Dhaneshwar, Aryan Rajput, Tarun Gaur" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <!-- Open Graph Title -->
    <meta
    property="og:title"
    content="BoundaryLine | Real-Time Cricket Scoring Platform"
    />
    
    <!-- Open Graph Description -->
    <meta
    property="og:description"
    content="Manage matches, teams, squads, playing XI, live scoring and commentary with real-time updates."
    />
    
    <!-- Open Graph Image -->
    <meta
      property="og:image"
      content="https://boundary-line-iota.vercel.app/og-image.png"
    />

    <meta
      property="og:url"
      content="https://boundary-line-iota.vercel.app/"
    />

    <meta property="og:site_name" content="BoundaryLine" />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="BoundaryLine | Real-Time Cricket Scoring Platform"
    />

    <meta
      name="twitter:description"
      content="Real-time cricket scoring and match management platform."
    />

    <meta
      name="twitter:image"
      content="https://boundaryline.vercel.app/og-image.png"
    />

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
